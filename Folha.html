<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Página de Receitas - Modelo Fiel A4</title>
    <style>
        /* Importação das fontes do Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Style+Script&family=Handlee&family=Montserrat:wght@700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            font-family: 'Montserrat', sans-serif;
        }

        /* Proporções estritas A4 */
        .page {
            width: 210mm;
            height: 297mm;
            padding: 20mm;
            margin: 10mm auto;
            background: #fbf9f3; /* Tom creme vintage */
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            color: #d14777; /* Rosa/magenta original */
            position: relative;
        }

        .header {
            display: flex;
            justify-content: center;
            margin-bottom: 35px;
        }

        .title-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .title {
            font-family: 'Style Script', cursive;
            font-size: 80px;
            line-height: 1;
            font-weight: normal;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .title-box {
            border: 2px solid #d14777;
            border-radius: 18px;
            width: 70%;
            max-width: 600px;
            height: 60px;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Handlee', cursive;
            font-size: 40px;
            font-weight: 600;
            color: #222222;
            text-align: center;
        }

        .section-title {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        /* SOLUÇÃO DO BUG: Nova classe para escrita fluida e natural sobre os pontos */
        .lined-editable {
            outline: none;
            font-family: 'Handlee', cursive;
            font-size: 20px;
            font-weight: 400;
            color: #222222;
            line-height: 30px; /* Força cada linha a ter exatamente 30px de altura */
            text-align: left;
            padding: 0 5px;
            
            /* Cria os pontos perfeitos no fundo que se repetem verticalmente a cada 30px */
            background-image: radial-gradient(circle, #e68fae 0.8px, transparent 1.2px);
            background-size: 6px 30px;
            background-position: 0 38px; /* Alinha a base da caligrafia exatamente sobre os pontos */
            background-repeat: repeat;
        }

        /* Seção de Ingredientes em duas colunas */
        .ingredients-container {
            display: flex;
            position: relative;
            margin-bottom: 35px;
        }

        .ingredients-column {
            flex: 1;
        }

        .ingredients-column:first-child {
            padding-right: 25px;
            border-right: 1.5px solid #d14777;
        }

        .ingredients-column:last-child {
            padding-left: 25px;
        }

        .prep-section {
            margin-bottom: 40px;
        }

        /* Rodapé Fixo */
        .footer {
            position: absolute;
            bottom: 21mm;
            left: 20mm;
            right: 20mm;
            display: flex;
            flex-direction: column;
            gap: 9px;
        }

        .footer-row {
            display: flex;
            align-items: flex-end;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .footer-line {
            border-bottom: 1.5px dotted #e68fae;
            flex-grow: 1;
            margin-left: 12px;
            height: 25px;
            outline: none;
            font-family: 'Handlee', cursive;
            font-size: 17px;
            color: #a62b55;
            padding-left: 10px;
            display: flex;
            align-items: flex-end;
            padding-bottom: 2px;
        }

        @media print {
            body {
                background: none;
            }
            .page {
                margin: 0;
                box-shadow: none;
                page-break-after: always;
                background: #fbf9f3 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>

    <div class="page">
        <div class="header">
            <div class="title-container">
                <span class="title">Receita de</span>
                <div class="title-box" contenteditable="true"></div>
            </div>
        </div>
        
        <div class="section-title">Ingredientes</div>
        <div class="ingredients-container">
            <!-- Coluna 1 de Ingredientes: Bloco único contínuo (equivalente a 6 linhas originais) -->
            <div class="ingredients-column">
                <div class="lined-editable" contenteditable="true" style="min-height: 180px;"></div>
            </div>
            <!-- Coluna 2 de Ingredientes: Bloco único contínuo -->
            <div class="ingredients-column">
                <div class="lined-editable" contenteditable="true" style="min-height: 180px;"></div>
            </div>
        </div>
        
        <div class="section-title">Modo de Preparar</div>
        <div class="prep-section">
            <!-- Modo de Preparar: Bloco único contínuo (equivalente a 15 linhas originais) -->
            <div class="lined-editable" contenteditable="true" style="min-height: 450px;"></div>
        </div>
        
        <div class="footer">
            <div class="footer-row">
                <span>RECEITA DADA POR:</span>
                <div class="footer-line" contenteditable="true"></div>
            </div>
            <div class="footer-row">
                <span>PORÇÃO PARA:</span>
                <div class="footer-line" contenteditable="true"></div>
            </div>
        </div>
    </div>

</body>
</html>
